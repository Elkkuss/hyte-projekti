<!doctype html>
<html lang="fi">
  <head>
    <title>Positioning Items</title>
    <meta charset="UTF-8" />

  </head>
  <body>

<!---------------- Navigaatio ---------------->
    <nav>
      <ul>
        <li><a href="" id="logo">HYTE</a></li>
        <li>
          <a href="index.html" class="Selected navlink">Koti</a>

  <!-- Main sisältää napit päiväkirja merkintöjen hakuun,
    ja lisäämiseen sekä paikat merkinnöille -->
    <main>
      <h2>Tänne päiväkirja</h2>
      <button class="get_entries">Hae päiväkirjamerkinnät</button>
      <button id="open-entry-form">Lisää uusi merkintä</button>

      <div id="entry-form-container" class="entry-form hidden">
        <form id="new-entry-form" class="entry-form-content">

          <h2>Uusi päiväkirjamerkintä</h2>

          <div class="form-row">
            <label>Päivämäärä</label>
            <input type="date" id="entry-date" required>
          </div>

          <div class="form-row">
            <label>Mieliala</label>
            <input type="text" id="entry-mood" placeholder="Esim. neutraali, stressaantunut" required>
          </div>

          <div class="form-row">
            <label>Paino (kg)</label>
            <input type="number" id="entry-weight" step="0.1">
          </div>

          <div class="form-row">
            <label>Uni (h)</label>
            <input type="number" id="entry-sleep">
          </div>

          <div class="form-row">
            <label>Muistiinpanot</label>
            <textarea id="entry-notes" rows="4"></textarea>
          </div>

          <button type="submit" class="save-btn">Tallenna merkintä</button>
        </form>
      </div>


      <!-- Flexbox pohja johon kortit luodaan -->
      <section class="diary-card">
        <div class="card">
          <h2>Otsikko</h2>
          <p>Teksti</p>
        </div>
        <div class="card">
          <h2>Otsikko</h2>
          <p>Teksti</p>
        </div>
        <div class="card">
          <h2>Otsikko</h2>
          <p>Teksti</p>
        </div>
        <div class="card">
          <h2>Otsikko</h2>
          <p>Teksti</p>
        </div>
      </section>

    </main>

    <footer>Copyright by Elias</footer>

     <dialog class="diary_dialog">
      <h2>Tässä on dialogi</h2>
      <p>Tänne voi avata ja muokata tietoa vaikka formissa</p>
      <div class="diary_id">ID</div>
      <button autofocus>Close</button>
    </dialog>
    <script type="module" src="/src/js/diary.js"></script>
    <script type="module" src="/src/js/login.js"></script>
  </body>
</html>
